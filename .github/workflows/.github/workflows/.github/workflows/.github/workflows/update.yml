name: Update World Cup scores

on:
  schedule:
    # Runs every 3 hours — covers matches in all time zones
    - cron: '0 */3 * * *'
  workflow_dispatch:   # lets you trigger it manually from GitHub too

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch results & patch index.html
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python update_scores.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "⚽ Auto-update scores $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
